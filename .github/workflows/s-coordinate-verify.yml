name: s-coordinate-verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify required repository files exist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required_paths = [
              "README.md",
              "LICENSE",
              "demo/s_coordinate.py",
              "demo/s_coordinate_visual.py",
              "outputs/S_COORDINATE_VISIBLE.png",
              "docs/Quickstart.md",
              "docs/FAQ.md",
              "docs/Proof-Sketch.md",
              "docs/S-Coordinate-Architecture-Notes.md",
              "docs/S-Coordinate-Challenge.md",
              "docs/S-Coordinate_v1.2.pdf",
              "docs/S-Coordinate-Diagram.png",
              "docs/Dependency-Elimination-Framework.png",
              "docs/Shunyaya-Structural-Stack.png",
              "VERIFY/VERIFY.txt",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [p for p in required_paths if not Path(p).exists()]
          if missing:
              print("ERROR: Missing required repository files:")
              for p in missing:
                  print(" -", p)
              sys.exit(1)

          print("Required repository files verified.")
          PY

      - name: Verify frozen SHA256 hashes
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import re
          import sys
          from pathlib import Path

          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")

          targets = {
              "demo/s_coordinate.py": Path("demo/s_coordinate.py"),
              "demo/s_coordinate_visual.py": Path("demo/s_coordinate_visual.py"),
          }

          freeze_text = freeze_path.read_text(encoding="utf-8", errors="replace")

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          for label, path in targets.items():
              label_variants = [
                  re.escape(label),
                  re.escape(label.replace("/", "\\")),
              ]

              pattern = rf"({'|'.join(label_variants)})\s*SHA256:\s*([0-9a-f]{{64}})"
              match = re.search(pattern, freeze_text, re.IGNORECASE)

              if not match:
                  print(f"ERROR: No frozen SHA256 entry found for {label}")
                  sys.exit(1)

              expected = match.group(2).lower()
              actual = sha256_file(path).lower()

              if actual != expected:
                  print(f"ERROR: Hash mismatch for {label}")
                  print("Expected:", expected)
                  print("Actual:  ", actual)
                  sys.exit(1)

              print(f"Hash verified for {label}: {actual}")

          print("Frozen SHA256 verification completed.")
          PY

      - name: Run S-Coordinate Python demo
        shell: bash
        run: |
          python demo/s_coordinate.py

      - name: Verify S-Coordinate output markers
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/s_coordinate.py"]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          out = result.stdout

          required_markers = [
              "VISIBLE",
              "certificate: cd51155c6ec1dfcd",
          ]

          missing = [marker for marker in required_markers if marker not in out]
          if missing:
              print("ERROR: S-Coordinate output missing expected markers:")
              for marker in missing:
                  print(" -", marker)
              print("\nFull output:\n")
              print(out)
              sys.exit(1)

          print("S-Coordinate output markers verified.")
          PY

      - name: Verify deterministic demo output
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/s_coordinate.py"]

          result1 = subprocess.run(cmd, capture_output=True, text=True, check=True)
          result2 = subprocess.run(cmd, capture_output=True, text=True, check=True)

          if result1.stdout != result2.stdout:
              print("ERROR: Non-deterministic S-Coordinate output for identical run")
              sys.exit(1)

          print("Deterministic S-Coordinate output verified.")
          PY

      - name: Verify visual demo source contains expected structural hooks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          text = Path("demo/s_coordinate_visual.py").read_text(encoding="utf-8", errors="replace")

          required_snippets = [
              "Structural Coordinate Resolution",
              "VISIBLE",
              "NOT_VISIBLE",
              "RESOLVED",
              "VALID",
              "LOCAL-STRUCTURAL-FRAME",
              "certificate",
              "sigma",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: visual demo is missing expected structural hooks:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("Visual demo structural hooks verified.")
          PY

      - name: Verify README contains core S-Coordinate claims
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          text = Path("README.md").read_text(encoding="utf-8", errors="replace")

          required_snippets = [
              "Structural Coordinate Resolution",
              "Coordinates Become Visible Only When Structurally Admissible",
              "coordinate_visible iff S = RESOLVED AND tau = VALID AND sigma_deterministic",
              "coordinate_visibility = resolve(structure)",
              "Coordinates show where. Structure decides whether.",
              "same structure -> same visibility -> same certificate",
              "S-Coordinate-Diagram.png",
              "demo/s_coordinate.py",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: README.md is missing expected S-Coordinate claims:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("README core claims verified.")
          PY
